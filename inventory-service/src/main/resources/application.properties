# Server
server.port=8082

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/inventory_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# URL del Products Service
products.service.url=${PRODUCTS_SERVICE_URL:http://localhost:8081}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# Circuit Breaker
resilience4j.circuitbreaker.instances.productsService.sliding-window-size=5
resilience4j.circuitbreaker.instances.productsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productsService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productsService.permitted-number-of-calls-in-half-open-state=2

# Retry
resilience4j.retry.instances.productsService.max-attempts=3
resilience4j.retry.instances.productsService.wait-duration=500ms

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT
jwt.secret=${JWT_SECRET:mi-clave-super-secreta-para-jwt-debe-ser-larga-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}